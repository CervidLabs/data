name: CD @Cervid/release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: 🚀 Release & Tagging
    runs-on: ubuntu-latest
    # IMPORTANTE: Solo se ejecuta si el código llega a la rama principal
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que Changesets analice el historial de git

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Final Safety Check (Tests)
        run: npm run test:coverage

      - name: 🏷️ Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Si no hay archivos en .changeset, intenta publicar
          publish: npx changeset tag
          # Estos tres parámetros son los que evitan que Husky rebote el commit automático
          commit: 'chore: version packages'
          title: 'chore: version packages'
          setupGitUser: true # Permite que la acción configure el user de git automáticamente
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}